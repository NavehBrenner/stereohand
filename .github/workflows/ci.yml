name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      # Same tasks `poe check` runs locally, so CI and dev share one definition.
      - name: Lint
        run: poe lint
      - name: Format check
        run: poe fmt-check
      - name: Typecheck
        run: poe typecheck
      - name: Test
        run: poe test
